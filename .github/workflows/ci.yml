name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "boto3>=1.34.0,<2.0.0" \
            "pandas>=2.1.0,<3.0.0" \
            "numpy>=1.26.0,<2.0.0" \
            "requests>=2.31.0,<3.0.0" \
            "pytest>=7.4.0,<9.0.0" \
            "moto[s3,athena]>=5.0.0,<6.0.0" \
            "responses>=0.25.0,<1.0.0" \
            "flake8>=7.0.0,<8.0.0" \
            "bandit>=1.7.0,<2.0.0" \
            "pip-audit>=2.7.0,<3.0.0" \
            "checkov>=3.0.0,<4.0.0"

      - name: Lint
        run: flake8 utils.py stock_pipeline/ crypto_pipeline/ weather_pipeline/ edgar_pipeline/ fred_pipeline/ analysis_pipeline/ monitoring/ tests/

      - name: Security scan (bandit)
        run: |
          bandit -r utils.py stock_pipeline/ crypto_pipeline/ weather_pipeline/ \
            edgar_pipeline/ fred_pipeline/ analysis_pipeline/ monitoring/ \
            --severity-level medium -q

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit -r requirements.txt
        continue-on-error: true

      - name: Terraform IaC security scan (checkov)
        run: checkov -d terraform/ --framework terraform --quiet --compact
        continue-on-error: true

      - name: Terraform fmt check
        run: terraform fmt -check terraform/

      - name: Run tests
        run: pytest tests/ -v
